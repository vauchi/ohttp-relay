version = 1
SPDX-PackageName = "vauchi-ohttp-relay"
SPDX-PackageSupplier = "Mattia Egloff <mattia.egloff@pm.me>"

# License files
[[annotations]]
path = ["LICENSES/**"]
SPDX-FileCopyrightText = "Free Software Foundation"
SPDX-License-Identifier = "GPL-3.0-or-later"

# Lock files
[[annotations]]
path = ["**/Cargo.lock", "**/*.lock"]
SPDX-FileCopyrightText = "2026 Mattia Egloff <mattia.egloff@pm.me>"
SPDX-License-Identifier = "GPL-3.0-or-later"

# Git config files
[[annotations]]
path = [".gitignore", "**/.gitignore", ".dockerignore"]
SPDX-FileCopyrightText = "2026 Mattia Egloff <mattia.egloff@pm.me>"
SPDX-License-Identifier = "GPL-3.0-or-later"

# cargo-vet supply chain files (headers stripped by cargo-vet on regeneration)
[[annotations]]
path = ["supply-chain/**"]
SPDX-FileCopyrightText = "2026 Mattia Egloff <mattia.egloff@pm.me>"
SPDX-License-Identifier = "GPL-3.0-or-later"
