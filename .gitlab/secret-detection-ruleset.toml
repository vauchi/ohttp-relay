# Fuzz corpus seeds are attack-shaped inputs by design (e.g.
# seed-credentials-rejected must contain a credentials-in-URL pattern to
# exercise the validate_gateway_url rejection path in src/config.rs), so
# Gitleaks flags them as leaked secrets. Extend the analyzer's default
# config instead of replacing it: only the corpus path is allowlisted.
[secrets]
  description = "Default gitleaks rules; fuzz corpus seeds allowlisted"

  [[secrets.passthrough]]
    type = "raw"
    target = "gitleaks.toml"
    value = """
[extend]
path = "/gitleaks.toml"

[allowlist]
  description = "Fuzz corpus seeds are deliberate attack-pattern test vectors, not secrets"
  paths = ['''(^|/)fuzz/corpus/''']
"""
