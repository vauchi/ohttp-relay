# GitLab CI for vauchi-ohttp-relay
#
# Minimal OHTTP forwarding proxy — no vauchi crate dependencies.
#
# Performance optimizations:
#   - Self-hosted runners: sccache, persistent caches, load-balanced
#   - Change-based rules: Jobs run only when relevant files change
#   - Timeouts: Prevent runaway jobs from blocking runners
#   - Interruptible: Auto-cancel on new commits (via templates)
#   - Read-only cache for lint jobs

# Shared templates
include:
  - project: 'vauchi/scripts'
    ref: main
    file:
      - '/ci-templates/rust-base.yml'
      - '/ci-templates/security.yml'
      - '/ci-templates/coverage.yml'
      - '/ci-templates/mr-rules.yml'
      - '/ci-templates/reuse.yml'
      - '/ci-templates/release.yml'
      - '/ci-templates/test-quality.yml'
      - '/ci-templates/image-lint.yml'
      - '/ci-templates/badges.yml'
      - '/ci-templates/perf.yml'
      - '/ci-templates/github-mirror.yml'
      - '/ci-templates/mutation.yml'
  - template: Security/Container-Scanning.gitlab-ci.yml

stages:
  - auto-tag
  - lint
  - test
  - mutation
  - security
  - build
  - load
  - scan
  - deploy

variables:
  CS_IMAGE: $CI_REGISTRY_IMAGE:$CI_COMMIT_SHA

# ============================================================
# Auto-Tag Stage
# ============================================================

auto-tag:version:
  extends: .auto-tag

# ============================================================
# Lint Stage — Preflight Gate (change-based)
# ============================================================

lint:format:
  extends: [.rust-runner-nocache, .lint-format, .validation-rust, .timeout-quick]
  needs: []

lint:clippy:
  extends: [.rust-runner-readonly, .lint-clippy, .validation-rust, .timeout-quick]
  needs: []

lint:duplicates:
  extends: [.rust-runner-nocache, .lint-duplicates-job, .timeout-quick]

lint:machete:
  extends: [.rust-runner-nocache, .lint-machete-job, .timeout-quick]

lint:images:
  extends: [.image-lint]

# ============================================================
# Test Stage (change-based, gated by lint)
# ============================================================

# MR: fast nextest (no coverage overhead)
test:
  extends: [.rust-runner, .validation-rust, .timeout-standard]
  stage: test
  needs:
    - job: lint:format
      optional: true
  script:
    - cargo nextest run --profile ci --all-targets
  artifacts:
    when: always
    reports:
      junit: target/nextest/ci/junit.xml
    expire_in: 1 week

# Main: full coverage with llvm-cov
coverage:
  extends: [.coverage-job, .rust-runner, .timeout-long]
  before_script:
    - !reference [.self-hosted, before_script]
    - !reference [.git-credentials, before_script]
    - rustup component add llvm-tools-preview 2>/dev/null || true
  variables:
    COVERAGE_REPO_LABEL: "ohttp-relay"

# ============================================================
# Mutation Stage (uses shared template from vauchi/scripts)
# ============================================================

mutation:nightly:
  extends: [.mutation-nightly, .rust-runner]
  timeout: 12h

# ============================================================
# Fuzz Stage (nightly, libfuzzer via cargo-fuzz)
# ============================================================

fuzz:nightly:
  extends: [.rust-runner]
  timeout: 12h
  stage: mutation
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule" && $FUZZ_ENABLED == "true"
  allow_failure: true
  script:
    - |
      # cargo-fuzz requires nightly for -Zsanitizer=address
      rustup toolchain install nightly --profile minimal --component llvm-tools-preview 2>/dev/null || true
      command -v cargo-fuzz >/dev/null 2>&1 || cargo +nightly install cargo-fuzz --locked --force

      cd fuzz
      FUZZ_DURATION="${FUZZ_DURATION_SECS:-300}"
      FUZZ_JOBS="${FUZZ_PARALLEL_JOBS:-1}"
      REPORT_DIR="../fuzz-report"
      mkdir -p "$REPORT_DIR"

      TARGETS="fuzz_validate_gateway_url"

      TARGET_COUNT=$(echo $TARGETS | wc -w | tr -d ' ')
      echo "=== Fuzzing ${TARGET_COUNT} targets, ${FUZZ_JOBS} parallel, ${FUZZ_DURATION}s each ==="

      echo "$TARGETS" | tr ' ' '\n' | grep -v '^$' | \
        xargs -P "$FUZZ_JOBS" -I{} sh -c \
          'echo "START: {}"; cargo +nightly fuzz run {} -- -max_total_time='"$FUZZ_DURATION"' 2>&1 && echo "PASS:{}" || echo "CRASH:{}"' \
          | tee /tmp/fuzz-output.log

      FAILED=$(grep -c '^CRASH:' /tmp/fuzz-output.log || true)
      PASSED=$(grep -c '^PASS:' /tmp/fuzz-output.log || true)

      # Generate JUnit XML report for GitLab test tab
      cat > "$REPORT_DIR/fuzz-junit.xml" <<JUNIT_EOF
      <?xml version="1.0" encoding="UTF-8"?>
      <testsuites name="fuzz:nightly" tests="${TARGET_COUNT}" failures="${FAILED}">
        <testsuite name="cargo-fuzz" tests="${TARGET_COUNT}" failures="${FAILED}">
      JUNIT_EOF
      for t in $TARGETS; do
        STATUS=$(grep -E "^(PASS|CRASH):${t}$" /tmp/fuzz-output.log | head -1 | cut -d: -f1)
        if [ "$STATUS" = "CRASH" ]; then
          echo "    <testcase name=\"${t}\" classname=\"fuzz\"><failure message=\"Crash found\"/></testcase>" >> "$REPORT_DIR/fuzz-junit.xml"
        else
          echo "    <testcase name=\"${t}\" classname=\"fuzz\"/>" >> "$REPORT_DIR/fuzz-junit.xml"
        fi
      done
      echo "  </testsuite>" >> "$REPORT_DIR/fuzz-junit.xml"
      echo "</testsuites>" >> "$REPORT_DIR/fuzz-junit.xml"

      echo "=== Fuzz Summary: Targets=${TARGET_COUNT}, Passed=$PASSED, Crashes=$FAILED ==="
      [ "$FAILED" -eq 0 ] || exit 1
  cache:
    key: fuzz-corpus-ohttp-relay
    paths:
      - fuzz/corpus/
    policy: pull-push
  artifacts:
    when: always
    paths:
      - fuzz/artifacts/
      - fuzz-report/
    reports:
      junit: fuzz-report/fuzz-junit.xml
    expire_in: 1 month

# ============================================================
# Security Stage (change-based, gated by lint, parallel with test)
# ============================================================

semgrep-sast:
  tags: [docker]
  needs:
    - job: lint:format
      optional: true
    - job: lint:clippy
      optional: true
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        compare_to: refs/heads/$CI_DEFAULT_BRANCH
        paths:
          - "**/*.rs"
          - ".gitlab-ci.yml"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_PIPELINE_SOURCE == "schedule"

secret_detection:
  tags: [docker]
  needs:
    - job: lint:format
      optional: true
    - job: lint:clippy
      optional: true
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

container_scanning:
  stage: scan
  needs: ["build:docker"]
  tags: [docker]
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/
    - if: $CI_PIPELINE_SOURCE == "schedule"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      allow_failure: true

security:audit:
  extends: [.rust-runner-readonly, .security-audit-job]

security:deny:
  extends: [.rust-runner-readonly, .security-deny-job]

security:vet:
  extends: [.rust-runner-readonly, .security-vet-job]

# ============================================================
# Build Stage
# ============================================================

build:release:
  extends: [.linux-runner, .timeout-standard]
  stage: build
  needs:
    - job: test
      optional: true
    - job: lint:format
      optional: true
  script:
    - cargo build --release
  artifacts:
    paths:
      - target/release/vauchi-ohttp-relay
    expire_in: 1 week
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/
    - if: $CI_PIPELINE_SOURCE == "schedule"

build:docker:
  extends: .timeout-standard
  stage: build
  tags: [docker]
  image: docker:27
  services:
    - docker:dind
  variables:
    DOCKER_BUILDKIT: "1"
  script:
    - |
      if [ -n "$CI_REGISTRY_PASSWORD" ]; then
        echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin $CI_REGISTRY
      fi
    - BUILD_INFO="{\"sha\":\"$CI_COMMIT_SHA\",\"short_sha\":\"$CI_COMMIT_SHORT_SHA\",\"ref\":\"$CI_COMMIT_REF_NAME\",\"built\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\",\"pipeline\":\"$CI_PIPELINE_URL\"}"
    - docker build --build-arg BUILD_INFO="$BUILD_INFO" --cache-from $CI_REGISTRY_IMAGE:latest -t $CI_REGISTRY_IMAGE:$CI_COMMIT_SHA .
    - docker tag $CI_REGISTRY_IMAGE:$CI_COMMIT_SHA $CI_REGISTRY_IMAGE:latest
    - |
      if [ -n "$CI_REGISTRY_PASSWORD" ]; then
        docker push $CI_REGISTRY_IMAGE:$CI_COMMIT_SHA
        docker push $CI_REGISTRY_IMAGE:latest
      fi
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/

# ============================================================
# Load Stage (nightly, k6 HTTP load test)
# ============================================================

# k6 HTTP load test — runs against a local ohttp-relay instance
# with a mock upstream gateway. Tests throughput, latency, and
# rate limiting under sustained load.
# Thresholds: p95 forward < 500ms, p95 key < 300ms, >95% success.
load:k6:
  extends: [.linux-runner, .timeout-standard]
  stage: load
  needs:
    - job: build:release
      artifacts: true
  before_script:
    - !reference [.self-hosted, before_script]
    - command -v k6 >/dev/null 2>&1 || { curl -fsSL https://github.com/grafana/k6/releases/download/v0.56.0/k6-v0.56.0-linux-amd64.tar.gz | tar xz --strip-components=1 -C /usr/local/bin k6-v0.56.0-linux-amd64/k6; }
  script:
    - |
      # Start mock upstream gateway (Python HTTP server on port 9090)
      python3 tests/load/mock-gateway.py 9090 &
      MOCK_PID=$!

      # Wait for mock gateway
      for i in $(seq 1 10); do
        curl -sf http://127.0.0.1:9090/health >/dev/null 2>&1 && break
        sleep 0.5
      done
      curl -sf http://127.0.0.1:9090/health || { echo "Mock gateway failed to start"; kill $MOCK_PID; exit 1; }

      # Start ohttp-relay pointing at mock gateway
      OHTTP_RELAY_LISTEN_ADDR=127.0.0.1:8082 \
      OHTTP_RELAY_GATEWAY_URL=http://127.0.0.1:9090 \
      OHTTP_RELAY_RATE_LIMIT_PER_SEC=0 \
      ./target/release/vauchi-ohttp-relay &
      RELAY_PID=$!

      # Wait for relay to be ready
      for i in $(seq 1 20); do
        curl -sf http://127.0.0.1:8082/health >/dev/null 2>&1 && break
        delay=$(awk "BEGIN { v = 0.2 * 2^($i-1); print (v < 3.0 ? v : 3.0) }")
        sleep "$delay"
      done
      curl -sf http://127.0.0.1:8082/health || { echo "OHTTP relay failed to start"; kill $RELAY_PID $MOCK_PID; exit 1; }

      # Run k6 load test
      k6 run --summary-export=summary.json tests/load/ohttp-relay-load-test.js || K6_EXIT=$?

      kill $RELAY_PID $MOCK_PID 2>/dev/null || true
      exit ${K6_EXIT:-0}
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/
  allow_failure: true
  artifacts:
    paths:
      - summary.json
    expire_in: 1 week
    when: always

# ============================================================
# Deploy Stage
# ============================================================
# Auto-triggers the centralized deploy pipeline in _private.
# The _private pipeline has manual gate jobs — click "play" there.

deploy:trigger:
  stage: deploy
  needs:
    - job: build:docker
  trigger:
    project: vauchi/private
    branch: main
  variables:
    DEPLOY_SERVICE: ohttp-relay
    DEPLOY_IMAGE: "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHA"
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# ============================================================
# Dev Tag Pipeline (lightweight — lint + test only)
# ============================================================

dev:verify:
  extends: [.rust-runner-nocache, .dev-verify]
  stage: lint
  needs: []

dev:lint:format:
  extends: [.rust-runner-nocache, .dev-lint-format]

dev:lint:clippy:
  extends: [.rust-runner-readonly, .dev-lint-clippy]

dev:test:
  extends: [.rust-runner, .dev-test-nextest, .timeout-standard]

# ============================================================
# RC Tag Pipeline (full quality gate — no publish/deploy)
# ============================================================

rc:verify:
  extends: [.rust-runner-nocache, .rc-verify]
  stage: lint
  needs: []

rc:lint:format:
  extends: [.rust-runner-nocache, .rc-lint-format]

rc:lint:clippy:
  extends: [.rust-runner-readonly, .rc-lint-clippy]

rc:test:
  extends: [.coverage-job, .rust-runner, .timeout-long]
  needs:
    - job: rc:lint:format
      optional: true
    - job: rc:lint:clippy
      optional: true
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+-rc\.\d+$/
  before_script:
    - !reference [.self-hosted, before_script]
    - !reference [.git-credentials, before_script]
    - rustup component add llvm-tools-preview 2>/dev/null || true
  variables:
    COVERAGE_REPO_LABEL: "ohttp-relay"

rc:security:audit:
  extends: [.rust-runner-readonly, .rc-security-audit]

# ============================================================
# Deploy Stage — Badge Pages
# ============================================================

pages:
  extends: .badges-pages

github-mirror:
  extends: .github-mirror
